name: kabyle_duo
description: "A bilingual Kabyle (Taqbaylit) <-> French language-learning app for kids, with a Duolingo-style gamification loop."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  path_provider: ^2.1.4
  flutter_tts: ^4.2.0
  audioplayers: ^6.1.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# App-icon generation (run: dart run flutter_launcher_icons). Source is the
# custom Choukrilingo icon; produces Android mipmaps + web/favicon icons.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: "ic_launcher"
  min_sdk_android: 23
  remove_alpha_ios: false
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#58CC02"
    theme_color: "#58CC02"

flutter:
  uses-material-design: true
  assets:
    - assets/curriculum/curriculum.json
    - assets/icon/app_icon.png
    - assets/audio/sfx/
    # Native-speaker Kabyle recordings drop into assets/audio/kab/ and are
    # picked up automatically by AudioService; French uses on-device TTS.
  fonts:
    # Fallback so the Tifinagh yaz (ⵣ) and any Tifinagh text render on every
    # platform (Android ships it, but the web/desktop engines may not).
    - family: NotoTifinagh
      fonts:
        - asset: assets/fonts/NotoSansTifinagh-Regular.ttf
