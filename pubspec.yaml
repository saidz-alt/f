name: kabyle_duo
description: "A bilingual Kabyle (Taqbaylit) <-> French language-learning app for kids, with a Duolingo-style gamification loop."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  path_provider: ^2.1.4
  flutter_tts: ^4.2.0
  audioplayers: ^6.1.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/curriculum/curriculum.json
    - assets/audio/sfx/
    # Native-speaker Kabyle recordings drop into assets/audio/kab/ and are
    # picked up automatically by AudioService; French uses on-device TTS.
